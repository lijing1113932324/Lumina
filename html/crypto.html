<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encryption / Decryption Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      padding-top: 140px;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }

    .nav-menu {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 12px 25px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      background: #667eea;
      color: white;
    }

    .nav-btn.active {
      background: #667eea;
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 15px;
      font-size: 1.8rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .tool-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    .tool-card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5rem;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    .json-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .json-box {
      display: flex;
      flex-direction: column;
    }

    .json-box label {
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .json-box textarea {
      width: 100%;
      height: 250px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.9rem;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    .json-box textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .json-box textarea[readonly] {
      background: #f8f9fa;
      color: #333;
    }

    .convert-btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #6c757d;
    }

    .btn-secondary:hover {
      box-shadow: 0 5px 20px rgba(108, 117, 141, 0.4);
    }

    .error-message {
      color: #dc3545;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #28a745;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .copy-hint {
      margin-top: 16px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      color: #666;
      font-size: 0.9rem;
      text-align: center;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <h1>Encryption Tool</h1>
      <div class="nav-menu">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="database.html" class="nav-btn">Database</a>
        <a href="http.html" class="nav-btn">HTTP Tools</a>
        <a href="diff.html" class="nav-btn">Text Diff</a>
        <a href="crypto.html" class="nav-btn active">Encryption</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="tool-card">
      <h2>Encryption / Decryption</h2>
      <div class="json-section">
        <div class="json-box">
          <label>Input Text</label>
          <textarea id="crypto-input" placeholder="Enter text to encrypt or decrypt..."></textarea>
          <div class="error-message" id="crypto-error"></div>
        </div>
        <div class="json-box">
          <label>Output</label>
          <textarea id="crypto-result" placeholder="Result will appear here..." readonly></textarea>
          <div class="success-message" id="crypto-success">Operation successful!</div>
        </div>
      </div>
      <div class="convert-btn-group">
        <button class="btn" onclick="encryptText()">Encrypt</button>
        <button class="btn btn-secondary" onclick="decryptText()">Decrypt</button>
        <button class="btn btn-secondary" onclick="clearCrypto()">Clear</button>
        <button class="btn" onclick="copyToClipboard('crypto-result')">Copy Result</button>
        <span id="crypto-copy-hint" style="color: #28a745; font-size: 0.9rem; font-weight: 500; display: none;">✓ Copied</span>
      </div>
      <div class="copy-hint">Tip: Supports encryption and decryption modes</div>
    </div>

    <div class="footer">
      Encryption / Decryption Tool | Java HttpServer + HTML
    </div>
  </div>

  <script>
    async function encryptText() {
      const input = document.getElementById('crypto-input').value.trim();
      if (!input) {
        alert('Please enter text to encrypt');
        return;
      }

      try {
        const response = await fetch('/api/encrypt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: input })
        });
        const result = await response.json();
        if (result.success) {
          document.getElementById('crypto-result').value = formatJsonOutput(result.result);
        } else {
          alert('Encryption failed');
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    async function decryptText() {
      const input = document.getElementById('crypto-input').value.trim();
      if (!input) {
        alert('Please enter text to decrypt');
        return;
      }

      try {
        const response = await fetch('/api/decrypt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: input })
        });
        const result = await response.json();
        if (result.success) {
          document.getElementById('crypto-result').value = formatJsonOutput(result.result);
        } else {
          alert('Decryption failed');
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    function clearCrypto() {
      document.getElementById('crypto-input').value = '';
      document.getElementById('crypto-result').value = '';
      document.getElementById('crypto-error').classList.remove('show');
      document.getElementById('crypto-success').classList.remove('show');
    }

    function formatJsonOutput(text) {
      try {
        const parsed = JSON.parse(text);
        return JSON.stringify(parsed, null, 2);
      } catch (e) {
        return text;
      }
    }

    function copyToClipboard(elementId) {
      const element = document.getElementById(elementId);
      if (!element) return;

      let textToCopy;
      if (element.tagName === 'TEXTAREA' || element.tagName === 'INPUT') {
        textToCopy = element.value;
      } else {
        textToCopy = element.textContent;
      }

      navigator.clipboard.writeText(textToCopy).then(() => {
        const hint = document.getElementById('crypto-copy-hint');
        if (hint) {
          hint.style.display = 'inline';
          setTimeout(() => {
            hint.style.display = 'none';
          }, 2000);
        } else {
          alert('Copied!');
        }
      }).catch(err => {
        console.error('Copy failed:', err);
        alert('Copy failed, please try again');
      });
    }
  </script>
</body>
</html>
