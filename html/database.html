<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Query - Toolkit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      padding-top: 140px;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 15px;
      font-size: 1.8rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .nav-menu {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 12px 25px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      background: #667eea;
      color: white;
    }

    .nav-btn.active {
      background: #667eea;
      color: white;
    }

    .tool-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    .tool-card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.4rem;
      border-left: 4px solid #667eea;
      padding-left: 15px;
    }

    .db-config {
      margin-bottom: 25px;
    }

    .db-config label {
      display: block;
      color: #555;
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    .config-item {
      display: flex;
      flex-direction: column;
    }

    .config-item span {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .config-item input,
    .config-item select {
      padding: 10px 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .config-item input:focus,
    .config-item select:focus {
      outline: none;
      border-color: #667eea;
    }

    .sql-section {
      margin-bottom: 20px;
    }

    .sql-section label {
      display: block;
      color: #555;
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    .sql-section textarea {
      width: 100%;
      height: 100px;
      padding: 15px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      overflow: auto;
      transition: border-color 0.2s;
    }

    .sql-section textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #666;
      margin-left: 10px;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-sm {
      padding: 6px 15px;
      font-size: 0.85rem;
    }

    .result-section {
      margin-top: 25px;
    }

    .result-section label {
      display: block;
      color: #555;
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    .result-container {
      border: 2px solid #e9ecef;
      border-radius: 10px;
      overflow: hidden;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table th {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      font-size: 0.9rem;
    }

    table td {
      padding: 10px 12px;
      border-bottom: 1px solid #e9ecef;
      font-size: 0.9rem;
      color: #333;
      word-break: break-all;
    }

    table tr:hover {
      background: #f8f9fa;
    }

    table tr:last-child td {
      border-bottom: none;
    }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: #999;
      font-size: 0.95rem;
    }

    .result-message {
      padding: 15px;
      font-size: 0.9rem;
      border-radius: 8px;
      margin-top: 10px;
    }

    .result-message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .result-message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .error-message {
      color: #dc3545;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    .copy-btn {
      padding: 4px 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 5px;
    }

    .copy-btn:hover {
      background: #5a6fd6;
    }

    th .copy-btn {
      float: right;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <h1>Database Query Tool</h1>
      <div class="nav-menu">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="database.html" class="nav-btn active">Database</a>
        <a href="http.html" class="nav-btn">HTTP Tools</a>
        <a href="diff.html" class="nav-btn">Text Diff</a>
        <a href="crypto.html" class="nav-btn">Encryption</a>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="tool-card">
      <h2>MySQL Query</h2>
      
      <div class="db-config">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <label>Database Connection</label>
          <button class="btn btn-secondary" onclick="loadConfig()" style="margin-top: 0;">Refresh Config</button>
        </div>
        <div class="config-grid">
          <div class="config-item">
            <span>Host</span>
            <input type="text" id="db-host" placeholder="localhost" />
          </div>
          <div class="config-item">
            <span>Port</span>
            <input type="number" id="db-port" placeholder="3306" />
          </div>
          <div class="config-item">
            <span>Database</span>
            <select id="db-name" onchange="onDatabaseChange()">
              <option value="">Select database...</option>
            </select>
          </div>
          <div class="config-item">
            <span>Username</span>
            <input type="text" id="db-user" placeholder="username" />
          </div>
          <div class="config-item">
            <span>Password</span>
            <input type="password" id="db-password" placeholder="password" />
          </div>
        </div>
      </div>

      <div class="sql-section">
        <label>SQL Query</label>
        <textarea id="sql-input" placeholder="Enter SELECT query...
Example: SELECT * FROM users LIMIT 10"></textarea>
        <div class="error-message" id="sql-error"></div>
      </div>

      <button class="btn" onclick="executeSql()">Execute Query</button>
      <button class="btn btn-secondary" onclick="clearSql()">Clear</button>

      <div class="result-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <label>Query Result</label>
          <button class="btn btn-secondary btn-sm" onclick="copyResult()" style="display: none;" id="copy-btn">Copy Result</button>
        </div>
        <div class="result-container">
          <table id="result-table" style="display: none;">
            <thead>
              <tr id="result-header"></tr>
            </thead>
            <tbody id="result-body"></tbody>
          </table>
          <div id="result-empty" class="empty-state">Enter SQL query and execute</div>
          <div id="result-message" class="result-message"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let queryResultData = null;
    let queryResultColumns = null;

    // Save form data to localStorage
    function saveFormData() {
      const formData = {
        dbHost: document.getElementById('db-host').value,
        dbPort: document.getElementById('db-port').value,
        dbName: document.getElementById('db-name').value,
        dbUser: document.getElementById('db-user').value,
        dbPassword: document.getElementById('db-password').value,
        sqlInput: document.getElementById('sql-input').value,
        queryResult: queryResultData,
        queryColumns: queryResultColumns
      };
      localStorage.setItem('databaseFormData', JSON.stringify(formData));
    }

    // Load form data from localStorage
    function loadFormData() {
      const saved = localStorage.getItem('databaseFormData');
      if (saved) {
        try {
          const formData = JSON.parse(saved);
          document.getElementById('db-host').value = formData.dbHost || '';
          document.getElementById('db-port').value = formData.dbPort || '';
          
          // Set database select value
          const dbName = formData.dbName;
          if (dbName) {
            const dbSelect = document.getElementById('db-name');
            const option = dbSelect.querySelector(`option[value="${dbName}"]`);
            if (option) {
              option.selected = true;
            }
          }
          
          document.getElementById('db-user').value = formData.dbUser || '';
          document.getElementById('db-password').value = formData.dbPassword || '';
          document.getElementById('sql-input').value = formData.sqlInput || '';
          
          // Load saved query result
          if (formData.queryResult && formData.queryColumns) {
            queryResultData = formData.queryResult;
            queryResultColumns = formData.queryColumns;
            displayResult(formData.queryResult, formData.queryColumns);
          }
        } catch (e) {
          console.error('Failed to load form data:', e);
        }
      }
    }

    // Add event listeners to save form data on input
    document.addEventListener('DOMContentLoaded', function() {
      const inputs = ['db-host', 'db-port', 'db-name', 'db-user', 'db-password', 'sql-input'];
      inputs.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', saveFormData);
          el.addEventListener('change', saveFormData);
        }
      });
      
      // Load config first (creates database options), then form data
      loadConfig().then(() => {
        loadFormData();
      });
    });

    async function loadConfig() {
      try {
        const response = await fetch('/api/config?' + Date.now());
        const config = await response.json();
        
        // Only load config if fields are empty (user hasn't entered anything yet)
        if (config.connection) {
          if (!document.getElementById('db-host').value) {
            document.getElementById('db-host').value = config.connection.host || 'localhost';
          }
          if (!document.getElementById('db-port').value) {
            document.getElementById('db-port').value = config.connection.port || 3306;
          }
          if (!document.getElementById('db-user').value) {
            document.getElementById('db-user').value = config.connection.username || '';
          }
          if (!document.getElementById('db-password').value) {
            document.getElementById('db-password').value = config.connection.password || '';
          }
        }
        
        if (config.connection && config.connection.databases && Array.isArray(config.connection.databases)) {
          databaseConfigs = config.connection.databases;
          
          const dbSelect = document.getElementById('db-name');
          const currentDbValue = dbSelect.value;
          dbSelect.innerHTML = '';
          
          config.connection.databases.forEach((db, index) => {
            const option = document.createElement('option');
            option.value = db.name;
            option.textContent = db.name;
            if (currentDbValue && currentDbValue === db.name) {
              option.selected = true;
            } else if (index === 0 && !currentDbValue) {
              option.selected = true;
            }
            dbSelect.appendChild(option);
          });
          
          // Only load example SQL if SQL input is empty
          if (config.connection.databases.length > 0 && !document.getElementById('sql-input').value) {
            const firstDb = config.connection.databases[0];
            if (firstDb.exampleSql) {
              document.getElementById('sql-input').value = firstDb.exampleSql;
            }
          }
        }
        
        console.log('Config loaded:', config);
      } catch (error) {
        console.log('Cannot load config file, using defaults:', error);
        document.getElementById('db-host').value = 'localhost';
        document.getElementById('db-port').value = 3306;
      }
    }

    function onDatabaseChange() {
      const dbName = document.getElementById('db-name').value;
      const selectedDb = databaseConfigs.find(db => db.name === dbName);
      
      if (selectedDb && selectedDb.exampleSql) {
        document.getElementById('sql-input').value = selectedDb.exampleSql;
      }
    }

    async function executeSql() {
      const host = document.getElementById('db-host').value;
      const port = document.getElementById('db-port').value;
      const database = document.getElementById('db-name').value;
      const username = document.getElementById('db-user').value;
      const password = document.getElementById('db-password').value;
      const sql = document.getElementById('sql-input').value;
      
      const errorEl = document.getElementById('sql-error');
      errorEl.style.display = 'none';
      
      if (!host || !database || !sql) {
        errorEl.textContent = 'Please fill in host, database and SQL query';
        errorEl.style.display = 'block';
        return;
      }
      
      try {
        const response = await fetch('/api/db/query', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            host: host,
            port: parseInt(port) || 3306,
            database: database,
            username: username,
            password: password,
            sql: sql
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          displayResult(data.data, data.columns);
          saveFormData(); // Save query result
        } else {
          showError(data.message || 'Query failed');
        }
      } catch (error) {
        showError('Request failed: ' + error.message);
      }
    }

    function displayResult(data, columns) {
      const table = document.getElementById('result-table');
      const headerRow = document.getElementById('result-header');
      const tbody = document.getElementById('result-body');
      const empty = document.getElementById('result-empty');
      const message = document.getElementById('result-message');
      const copyBtn = document.getElementById('copy-btn');
      
      // Save result data for copy
      queryResultData = data;
      queryResultColumns = columns;
      
      table.style.display = 'table';
      empty.style.display = 'none';
      copyBtn.style.display = 'inline-block';
      
      // Build header
      headerRow.innerHTML = '';
      if (columns && columns.length > 0) {
        columns.forEach(col => {
          const th = document.createElement('th');
          th.textContent = col;
          headerRow.appendChild(th);
        });
        // Add Actions column header
        const actionTh = document.createElement('th');
        actionTh.textContent = 'Actions';
        headerRow.appendChild(actionTh);
      }
      
      // Build body
      tbody.innerHTML = '';
      if (data && data.length > 0) {
        data.forEach((row, rowIndex) => {
          const tr = document.createElement('tr');
          if (columns) {
            columns.forEach(col => {
              const td = document.createElement('td');
              const value = row[col];
              td.textContent = value !== null ? value : 'NULL';
              tr.appendChild(td);
            });
          }
          // Add copy button for this row
          const actionTd = document.createElement('td');
          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.textContent = 'Copy';
          copyBtn.onclick = () => copyRow(row, columns, rowIndex);
          actionTd.appendChild(copyBtn);
          tr.appendChild(actionTd);
          
          tbody.appendChild(tr);
        });
        
        message.className = 'result-message success';
        message.textContent = `Query successful! ${data.length} row(s) returned.`;
        message.style.display = 'block';
      } else {
        message.className = 'result-message success';
        message.textContent = 'Query executed successfully. No results returned.';
        message.style.display = 'block';
      }
    }

    function copyRow(row, columns, rowIndex) {
      if (!row || !columns) {
        alert('No data to copy');
        return;
      }
      
      // Build JSON object for this row
      const rowObj = {};
      columns.forEach(col => {
        rowObj[col] = row[col] !== null ? row[col] : null;
      });
      
      const rowText = JSON.stringify(rowObj, null, 2);
      
      navigator.clipboard.writeText(rowText).then(() => {
        // Find the copy button for this row and show feedback
        const buttons = document.querySelectorAll('.copy-btn');
        if (buttons[rowIndex + 1]) { // +1 because there's also the "Copy Result" button
          const btn = buttons[rowIndex + 1];
          const originalText = btn.textContent;
          btn.textContent = 'Copied!';
          btn.style.background = '#28a745';
          setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = '#667eea';
          }, 2000);
        }
      }).catch(err => {
        // Fallback for older browsers
        const textarea = document.createElement('textarea');
        textarea.value = rowText;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          const buttons = document.querySelectorAll('.copy-btn');
          if (buttons[rowIndex + 1]) {
            const btn = buttons[rowIndex + 1];
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.style.background = '#28a745';
            setTimeout(() => {
              btn.textContent = originalText;
              btn.style.background = '#667eea';
            }, 2000);
          }
        } catch (e) {
          alert('Failed to copy. Please select and copy manually.');
        }
        document.body.removeChild(textarea);
      });
    }

    function copyResult() {
      if (!queryResultData || !queryResultColumns) {
        alert('No data to copy');
        return;
      }
      
      // 转换为 JSON 格式字符串，包含每个字段的 key 和 value
      const jsonResult = JSON.stringify(queryResultData, null, 2);
      
      navigator.clipboard.writeText(jsonResult).then(() => {
        const copyBtn = document.getElementById('copy-btn');
        const originalText = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(() => {
          copyBtn.textContent = originalText;
        }, 2000);
      }).catch(err => {
        // Fallback for older browsers
        const textarea = document.createElement('textarea');
        textarea.value = jsonResult;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          const copyBtn = document.getElementById('copy-btn');
          const originalText = copyBtn.textContent;
          copyBtn.textContent = 'Copied!';
          setTimeout(() => {
            copyBtn.textContent = originalText;
          }, 2000);
        } catch (e) {
          alert('Failed to copy. Please select and copy manually.');
        }
        document.body.removeChild(textarea);
      });
    }

    function showError(error) {
      const table = document.getElementById('result-table');
      const empty = document.getElementById('result-empty');
      const message = document.getElementById('result-message');
      
      table.style.display = 'none';
      empty.style.display = 'none';
      
      message.className = 'result-message error';
      message.textContent = 'Error: ' + error;
      message.style.display = 'block';
      
      console.error('SQL Error:', error);
    }

    function clearSql() {
      document.getElementById('sql-input').value = '';
      document.getElementById('sql-error').style.display = 'none';
      
      const table = document.getElementById('result-table');
      const empty = document.getElementById('result-empty');
      const message = document.getElementById('result-message');
      
      table.style.display = 'none';
      empty.style.display = 'block';
      message.style.display = 'none';
      
      // Clear localStorage
      localStorage.removeItem('databaseFormData');
    }
  </script>
</html>
