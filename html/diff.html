<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Diff - Toolkit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      padding-top: 140px;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 15px;
      font-size: 1.8rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .nav-menu {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 12px 25px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      background: #667eea;
      color: white;
    }

    .nav-btn.active {
      background: #667eea;
      color: white;
    }

    .tool-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    .tool-card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.4rem;
      border-left: 4px solid #667eea;
      padding-left: 15px;
    }

    .diff-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .text-panel {
      display: flex;
      flex-direction: column;
    }

    .text-panel label {
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .text-panel .text-input {
      width: 100%;
      min-height: 200px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
      transition: border-color 0.3s;
      background: white;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .text-panel .text-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .text-panel .text-input:empty:before {
      content: attr(data-placeholder);
      color: #aaa;
    }

    .file-upload {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .file-upload input[type="file"] {
      display: none;
    }

    .file-upload label {
      display: inline-block;
      padding: 8px 16px;
      background: #f0f0f0;
      color: #666;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .file-upload label:hover {
      background: #e0e0e0;
    }

    .file-name {
      margin-left: 10px;
      color: #667eea;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .options {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .option-group label {
      cursor: pointer;
      color: #555;
      font-size: 0.95rem;
    }

    .diff-message {
      margin-top: 20px;
      padding: 15px 20px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
    }

    .diff-message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .diff-message.warning {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
    }

    .highlight-diff {
      background-color: #ffeaea;
      color: #dc3545;
      border-radius: 2px;
    }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .convert-btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: center;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 15px;
      background: #f8f9fa;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .stat-added {
      background: #d4edda;
      color: #155724;
    }

    .stat-removed {
      background: #f8d7da;
      color: #721c24;
    }

    .diff-output {
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 15px;
    }

    .diff-added {
      background: #d4edda;
      color: #155724;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .diff-removed {
      background: #f8d7da;
      color: #721c24;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .diff-unchanged {
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <h1>Text Diff Tool</h1>
      <div class="nav-menu">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="database.html" class="nav-btn">Database</a>
        <a href="http.html" class="nav-btn">HTTP Tools</a>
        <a href="diff.html" class="nav-btn active">Text Diff</a>
        <a href="crypto.html" class="nav-btn">Encryption</a>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="tool-card">
      <h2>Compare Two Texts</h2>
      
      <div class="diff-container">
        <div class="text-panel">
          <label>Original Text (Left)</label>
          <div class="file-upload">
            <input type="file" id="diff-file1" accept=".txt,.java,.js,.html,.css,.json,.xml,.md,.sql" onchange="loadDiffFile(1)">
            <label for="diff-file1">📁 Load File</label>
            <span class="file-name" id="diff-file1-name"></span>
          </div>
          <div id="diff-text1" class="text-input" data-placeholder="Enter original text here..." contenteditable="true"></div>
        </div>
        
        <div class="text-panel">
          <label>Modified Text (Right)</label>
          <div class="file-upload">
            <input type="file" id="diff-file2" accept=".txt,.java,.js,.html,.css,.json,.xml,.md,.sql" onchange="loadDiffFile(2)">
            <label for="diff-file2">📁 Load File</label>
            <span class="file-name" id="diff-file2-name"></span>
          </div>
          <div id="diff-text2" class="text-input" data-placeholder="Enter modified text here..." contenteditable="true"></div>
        </div>
      </div>
      
      <div class="options">
        <div class="option-group">
          <input type="checkbox" id="ignoreWhitespace" onchange="performDiff()">
          <label for="ignoreWhitespace">Ignore Whitespace</label>
        </div>
        <div class="option-group">
          <input type="checkbox" id="ignoreCase" onchange="performDiff()">
          <label for="ignoreCase">Ignore Case</label>
        </div>
        <div class="option-group">
          <input type="checkbox" id="ignoreOrder" onchange="performDiff()">
          <label for="ignoreOrder">Ignore Order (JSON)</label>
        </div>
      </div>
      
      <div class="convert-btn-group">
        <button class="btn" onclick="performDiff()">Compare</button>
        <button class="btn btn-secondary" onclick="clearDiff()">Clear</button>
      </div>
      
      <div id="diff-message" class="diff-message" style="display: none;">
        <div id="diff-message-content"></div>
      </div>
    </div>
  </div>

  <script>
    function isJson(text) {
      try {
        JSON.parse(text);
        return true;
      } catch {
        return false;
      }
    }

    function formatJson(text) {
      try {
        const parsed = JSON.parse(text);
        return JSON.stringify(parsed, null, 2);
      } catch {
        return text;
      }
    }

    function loadDiffFile(num) {
      const fileInput = document.getElementById('diff-file' + num);
      const fileNameSpan = document.getElementById('diff-file' + num + '-name');
      const textDiv = document.getElementById('diff-text' + num);
      
      const file = fileInput.files[0];
      if (file) {
        fileNameSpan.textContent = file.name;
        
        const reader = new FileReader();
        reader.onload = function(e) {
          let content = e.target.result;
          if (isJson(content)) {
            content = formatJson(content);
          }
          textDiv.textContent = content;
        };
        reader.readAsText(file);
      }
    }

    function clearDiff() {
      document.getElementById('diff-text1').textContent = '';
      document.getElementById('diff-text2').textContent = '';
      document.getElementById('diff-file1').value = '';
      document.getElementById('diff-file2').value = '';
      document.getElementById('diff-file1-name').textContent = '';
      document.getElementById('diff-file2-name').textContent = '';
      document.getElementById('diff-message').style.display = 'none';
      
      const textDiv1 = document.getElementById('diff-text1');
      const textDiv2 = document.getElementById('diff-text2');
      textDiv1.style.backgroundColor = '';
      textDiv2.style.backgroundColor = '';
      textDiv1.classList.remove('diff-highlight');
      textDiv2.classList.remove('diff-highlight');
    }

    function findDifferences(text1, text2) {
      const diffs1 = [];
      const diffs2 = [];
      
      const len1 = text1.length;
      const len2 = text2.length;
      const maxLen = Math.max(len1, len2);
      
      for (let i = 0; i < maxLen; i++) {
        const char1 = i < len1 ? text1[i] : '';
        const char2 = i < len2 ? text2[i] : '';
        
        if (char1 !== char2) {
          diffs1.push(i);
          diffs2.push(i);
        }
      }
      
      return { diffs1, diffs2 };
    }

    function highlightDifferences(textarea, diffs) {
      const text = textarea.value;
      let highlighted = '';
      
      for (let i = 0; i < text.length; i++) {
        if (diffs.includes(i)) {
          highlighted += `<mark style="background-color: #ffeaea; color: #dc3545;">${escapeHtml(text[i])}</mark>`;
        } else {
          highlighted += escapeHtml(text[i]);
        }
      }
      
      return highlighted;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function highlightTextDifferences(text1, text2, ignoreCase, ignoreWhitespace) {
      let highlighted1 = '';
      let highlighted2 = '';
      
      let compareText1 = text1;
      let compareText2 = text2;
      
      if (ignoreCase) {
        compareText1 = compareText1.toLowerCase();
        compareText2 = compareText2.toLowerCase();
      }
      
      if (ignoreWhitespace) {
        compareText1 = compareText1.replace(/\s/g, '');
        compareText2 = compareText2.replace(/\s/g, '');
      }
      
      const len1 = text1.length;
      const len2 = text2.length;
      const maxLen = Math.max(len1, len2);
      
      let ptr1 = 0, ptr2 = 0;
      
      for (let i = 0; i < maxLen; i++) {
        const char1 = i < len1 ? text1[i] : '';
        const char2 = i < len2 ? text2[i] : '';
        
        let cmpChar1 = char1;
        let cmpChar2 = char2;
        
        if (ignoreCase) {
          cmpChar1 = cmpChar1.toLowerCase();
          cmpChar2 = cmpChar2.toLowerCase();
        }
        
        if (ignoreWhitespace && char1.match(/\s/)) {
          highlighted1 += escapeHtml(char1);
          ptr1++;
          continue;
        }
        
        if (ignoreWhitespace && char2.match(/\s/)) {
          highlighted2 += escapeHtml(char2);
          ptr2++;
          continue;
        }
        
        if (cmpChar1 !== cmpChar2) {
          highlighted1 += `<span style="background-color: #ffeaea; color: #dc3545; border-radius: 2px;">${escapeHtml(char1) || '&nbsp;'}</span>`;
          highlighted2 += `<span style="background-color: #ffeaea; color: #dc3545; border-radius: 2px;">${escapeHtml(char2) || '&nbsp;'}</span>`;
        } else {
          highlighted1 += escapeHtml(char1);
          highlighted2 += escapeHtml(char2);
        }
      }
      
      return { highlighted1, highlighted2 };
    }

    function compareJsonObjects(obj1, obj2) {
      if (typeof obj1 !== typeof obj2) return false;
      
      if (Array.isArray(obj1) && Array.isArray(obj2)) {
        if (obj1.length !== obj2.length) return false;
        const sorted1 = [...obj1].sort((a, b) => JSON.stringify(a).localeCompare(JSON.stringify(b)));
        const sorted2 = [...obj2].sort((a, b) => JSON.stringify(a).localeCompare(JSON.stringify(b)));
        return JSON.stringify(sorted1) === JSON.stringify(sorted2);
      }
      
      if (typeof obj1 === 'object' && obj1 !== null && obj2 !== null) {
        const keys1 = Object.keys(obj1).sort();
        const keys2 = Object.keys(obj2).sort();
        
        if (JSON.stringify(keys1) !== JSON.stringify(keys2)) return false;
        
        for (const key of keys1) {
          if (!compareJsonObjects(obj1[key], obj2[key])) return false;
        }
        return true;
      }
      
      return obj1 === obj2;
    }

    function sortJson(obj, ignoreCase = false) {
      if (Array.isArray(obj)) {
        return obj.map(item => sortJson(item, ignoreCase)).sort((a, b) => JSON.stringify(a).localeCompare(JSON.stringify(b)));
      }
      if (typeof obj === 'object' && obj !== null) {
        const sorted = {};
        const keys = Object.keys(obj);
        keys.sort((a, b) => {
          if (ignoreCase) {
            return a.toLowerCase().localeCompare(b.toLowerCase());
          }
          return a.localeCompare(b);
        }).forEach(key => {
          sorted[key] = sortJson(obj[key], ignoreCase);
        });
        return sorted;
      }
      return obj;
    }

    function performDiff() {
      let text1 = document.getElementById('diff-text1').textContent;
      let text2 = document.getElementById('diff-text2').textContent;
      const ignoreWhitespace = document.getElementById('ignoreWhitespace').checked;
      const ignoreCase = document.getElementById('ignoreCase').checked;
      const ignoreOrder = document.getElementById('ignoreOrder').checked;
      
      const isJson1 = isJson(text1);
      const isJson2 = isJson(text2);
      
      if (isJson1) {
        text1 = formatJson(text1);
      }
      if (isJson2) {
        text2 = formatJson(text2);
      }
      
      let displayText1 = text1;
      let displayText2 = text2;
      
      if (ignoreOrder && isJson1 && isJson2) {
        try {
          const obj1 = JSON.parse(text1);
          const obj2 = JSON.parse(text2);
          const sortedObj1 = sortJson(obj1, ignoreCase);
          const sortedObj2 = sortJson(obj2, ignoreCase);
          displayText1 = JSON.stringify(sortedObj1, null, 2);
          displayText2 = JSON.stringify(sortedObj2, null, 2);
        } catch (e) {
          console.log('JSON parse error:', e);
        }
      }
      
      let compare1 = displayText1;
      let compare2 = displayText2;
      
      if (ignoreCase) {
        compare1 = compare1.toLowerCase();
        compare2 = compare2.toLowerCase();
      }
      
      if (ignoreWhitespace) {
        compare1 = compare1.replace(/\s+/g, '');
        compare2 = compare2.replace(/\s+/g, '');
      }
      
      const messageDiv = document.getElementById('diff-message');
      const messageContent = document.getElementById('diff-message-content');
      
      if (compare1 === compare2) {
        messageDiv.className = 'diff-message success';
        messageContent.textContent = '✅ Texts are identical';
        messageDiv.style.display = 'block';
        
        document.getElementById('diff-text1').innerHTML = escapeHtml(displayText1);
        document.getElementById('diff-text2').innerHTML = escapeHtml(displayText2);
        document.getElementById('diff-text1').style.backgroundColor = '#d4edda';
        document.getElementById('diff-text2').style.backgroundColor = '#d4edda';
      } else {
        messageDiv.className = 'diff-message warning';
        messageContent.textContent = '⚠️ Differences found, highlighted in red';
        messageDiv.style.display = 'block';
        
        const { highlighted1, highlighted2 } = highlightTextDifferences(displayText1, displayText2, ignoreCase, ignoreWhitespace);
        document.getElementById('diff-text1').innerHTML = highlighted1;
        document.getElementById('diff-text2').innerHTML = highlighted2;
        document.getElementById('diff-text1').style.backgroundColor = '';
        document.getElementById('diff-text2').style.backgroundColor = '';
      }
    }
  </script>
</body>
</html>
