<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolkit - Timestamp & JSON Formatter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      padding-top: 140px;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 15px;
      font-size: 1.8rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .nav-menu {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 12px 25px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      background: #667eea;
      color: white;
    }

    .nav-btn.active {
      background: #667eea;
      color: white;
    }

    .tool-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    .tool-card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.4rem;
      border-left: 4px solid #667eea;
      padding-left: 15px;
    }

    .timestamp-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .timestamp-box {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .timestamp-box label {
      display: block;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .timestamp-box .value {
      font-size: 1.5rem;
      font-weight: 600;
      color: #333;
      word-break: break-all;
    }

    .timestamp-box .value.small {
      font-size: 1.2rem;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 15px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #e9ecef;
      color: #333;
      margin-left: 10px;
    }

    .btn-secondary:hover {
      background: #dee2e6;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .json-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .json-section {
        grid-template-columns: 1fr;
      }
    }

    .json-box {
      display: flex;
      flex-direction: column;
    }

    .json-box label {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      height: 250px;
      padding: 15px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.9rem;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea.error {
      border-color: #dc3545;
    }

    .error-message {
      color: #dc3545;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #28a745;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .copy-hint {
      font-size: 0.8rem;
      color: #888;
      margin-top: 8px;
    }

    .convert-btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .footer {
      text-align: center;
      color: rgba(255,255,255,0.8);
      margin-top: 30px;
      font-size: 0.9rem;
    }

    .db-config {
      margin-bottom: 20px;
    }

    .db-config label {
      display: block;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .config-item {
      display: flex;
      flex-direction: column;
    }

    .config-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 5px;
    }

    .config-item input {
      padding: 10px 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .config-item input:focus {
      outline: none;
      border-color: #667eea;
    }

    .sql-section {
      margin-bottom: 20px;
    }

    .sql-section label {
      display: block;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .result-section {
      margin-top: 20px;
    }

    .result-section label {
      display: block;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .result-container {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      max-height: 400px;
      overflow: auto;
    }

    .result-container table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .result-container th,
    .result-container td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #dee2e6;
    }

    .result-container th {
      background: #e9ecef;
      font-weight: 600;
      color: #495057;
      position: sticky;
      top: 0;
    }

    .result-container tr:hover {
      background: #e9ecef;
    }

    .empty-state {
      color: #999;
      text-align: center;
      padding: 40px 0;
    }

    .result-message {
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .result-message.success {
      background: #d4edda;
      color: #155724;
    }

    .result-message.error {
      background: #f8d7da;
      color: #721c24;
    }

    .tab-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      justify-content: center;
    }

    .tab-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .tab-btn.active {
      background: white;
      color: #667eea;
      font-weight: 600;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .http-config {
      margin-bottom: 20px;
    }

    .http-config label {
      display: block;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .http-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .http-row select,
    .http-row input {
      padding: 10px 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .http-row select:focus,
    .http-row input:focus {
      outline: none;
      border-color: #667eea;
    }

    .http-row select {
      width: 120px;
      cursor: pointer;
      background: white;
    }

    .http-row input[type="text"] {
      flex: 1;
    }

    .http-headers {
      margin-bottom: 15px;
    }

    .http-headers textarea {
      height: 80px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.85rem;
    }

    .http-body {
      margin-bottom: 15px;
    }

    .http-body textarea {
      height: 120px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.85rem;
    }

    .response-section {
      margin-top: 20px;
    }

    .response-section label {
      display: block;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .response-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
      font-size: 0.85rem;
      color: #666;
    }

    .response-meta span {
      background: #f8f9fa;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .response-meta span.success {
      color: #28a745;
      background: #d4edda;
    }

    .response-meta span.error {
      color: #dc3545;
      background: #f8d7da;
    }

    .diff-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .text-panel {
      display: flex;
      flex-direction: column;
    }

    .text-panel label {
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .text-panel textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
      transition: border-color 0.3s;
    }

    .text-panel textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .file-upload {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .file-upload input[type="file"] {
      display: none;
    }

    .file-upload label {
      display: inline-block;
      padding: 8px 16px;
      background: #f0f0f0;
      color: #666;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .file-upload label:hover {
      background: #e0e0e0;
    }

    .file-name {
      margin-left: 10px;
      color: #667eea;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .options {
      display: flex;
      gap: 20px;
      margin-top: 15px;
    }

    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .option-group label {
      cursor: pointer;
      color: #555;
      font-size: 0.95rem;
    }

    .diff-output {
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 15px;
    }

    .diff-added {
      background: #d4edda;
      color: #155724;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .diff-removed {
      background: #f8d7da;
      color: #721c24;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .diff-unchanged {
      color: #6c757d;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 15px;
      background: #f8f9fa;
      border-radius: 6px;
    }

    .stat-added {
      background: #d4edda;
      color: #155724;
    }

    .stat-removed {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <h1>Toolkit</h1>
      <div class="nav-menu">
        <a href="index.html" class="nav-btn active">Home</a>
        <a href="database.html" class="nav-btn">Database</a>
        <a href="http.html" class="nav-btn">HTTP Tools</a>
        <a href="diff.html" class="nav-btn">Text Diff</a>
        <a href="crypto.html" class="nav-btn">Encryption</a>
      </div>
    </div>
  </div>

  <div class="container">

    <div id="tab-json-crypto" class="tab-content active">
    <div class="tool-card">
      <h2>JSON Formatter</h2>
      <div class="json-section">
        <div class="json-box">
          <label>Input JSON</label>
          <textarea id="json-input" placeholder="Enter JSON data..."></textarea>
          <div class="error-message" id="json-error"></div>
        </div>
        <div class="json-box">
          <label>Output</label>
          <textarea id="json-output" placeholder="Formatted JSON will appear here..." readonly></textarea>
          <div class="success-message" id="json-success">Operation successful!</div>
        </div>
      </div>
      <div class="convert-btn-group">
        <button class="btn" onclick="formatJson()">Format JSON</button>
        <button class="btn btn-secondary" onclick="minifyJson()">Minify JSON</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
        <button class="btn" onclick="copyToClipboard('json-output')">Copy Result</button>
        <span id="copy-hint" style="color: #28a745; font-size: 0.9rem; font-weight: 500; display: none;">✓ Copied</span>
      </div>
      <div class="copy-hint">Tip: Supports format and minify modes</div>
    </div>

    <div class="tool-card">
      <h2>Timestamp Tool</h2>
      <div class="timestamp-section">
        <div class="timestamp-box">
          <label>Current Time (ms)</label>
          <div class="value" id="timestamp-ms">--</div>
          <button class="btn btn-sm" onclick="copyToClipboard('timestamp-ms')">Copy</button>
        </div>
        <div class="timestamp-box">
          <label>Current Time (s)</label>
          <div class="value" id="timestamp-s">--</div>
          <button class="btn btn-sm" onclick="copyToClipboard('timestamp-s')">Copy</button>
        </div>
        <div class="timestamp-box">
          <label>Current DateTime</label>
          <div class="value small" id="current-date">--</div>
        </div>
      </div>
    </div>
    </div></function></seed:tool_call>

    <div class="footer">
      Timestamp & JSON Formatter & MySQL Query Tool | Java HttpServer + HTML
    </div>
  </div>

  <script>
    function switchTab(tabName) {
      const tabs = document.querySelectorAll('.tab-btn');
      const contents = document.querySelectorAll('.tab-content');
      
      tabs.forEach(tab => tab.classList.remove('active'));
      contents.forEach(content => content.classList.remove('active'));
      
      if (tabName === 'json-crypto') {
        tabs[0].classList.add('active');
        document.getElementById('tab-json-crypto').classList.add('active');
      } else if (tabName === 'crypto') {
        tabs[1].classList.add('active');
        document.getElementById('tab-crypto').classList.add('active');
      }
    }

    function copyToClipboard(elementId) {
      const element = document.getElementById(elementId);
      if (!element) return;

      let textToCopy;
      if (element.tagName === 'TEXTAREA' || element.tagName === 'INPUT') {
        textToCopy = element.value;
      } else {
        textToCopy = element.textContent;
      }

      if (!textToCopy || textToCopy === '--') {
        alert('No content to copy');
        return;
      }

      const tempTextarea = document.createElement('textarea');
      tempTextarea.value = textToCopy;
      
      tempTextarea.style.position = 'fixed';
      tempTextarea.style.left = '-9999px';
      tempTextarea.style.top = '-9999px';
      tempTextarea.style.width = '2em';
      tempTextarea.style.height = '2em';
      tempTextarea.style.padding = '0';
      tempTextarea.style.border = 'none';
      tempTextarea.style.outline = 'none';
      tempTextarea.style.boxShadow = 'none';
      tempTextarea.style.background = 'transparent';
      
      document.body.appendChild(tempTextarea);
      
      try {
        tempTextarea.select();
        tempTextarea.setSelectionRange(0, 99999);
        const successful = document.execCommand('copy');
        
        if (successful) {
          showCopySuccess(element);
        } else {
          alert('Copy failed, please select and copy manually');
        }
      } catch (err) {
        console.error('Copy failed:', err);
        alert('Copy failed, please select and copy manually');
      } finally {
        document.body.removeChild(tempTextarea);
      }
    }

    function showCopySuccess(element) {
      if (element.id === 'json-output') {
        const hint = document.getElementById('copy-hint');
        if (hint) {
          hint.style.display = 'inline';
          setTimeout(() => {
            hint.style.display = 'none';
          }, 2000);
        }
      } else if (element.tagName === 'TEXTAREA' || element.tagName === 'INPUT') {
        const hint = document.createElement('span');
        hint.textContent = '✓ Copied';
        hint.style.color = '#28a745';
        hint.style.marginLeft = '10px';
        hint.style.fontSize = '0.9rem';
        hint.style.fontWeight = '500';
        element.parentElement.appendChild(hint);
        setTimeout(() => {
          element.parentElement.removeChild(hint);
        }, 2000);
      } else {
        const originalText = element.textContent;
        element.textContent = '✓ Copied';
        setTimeout(() => {
          element.textContent = originalText;
        }, 2000);
      }
    }

    function formatJson() {
      const input = document.getElementById('json-input').value.trim();
      const output = document.getElementById('json-output');
      const errorDiv = document.getElementById('json-error');
      const successDiv = document.getElementById('json-success');

      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');

      if (!input) {
        errorDiv.textContent = 'Please enter JSON data';
        errorDiv.classList.add('show');
        return;
      }

      try {
        const parsed = JSON.parse(input);
        output.value = JSON.stringify(parsed, null, 2);
        successDiv.classList.add('show');
        document.getElementById('json-input').classList.remove('error');
      } catch (err) {
        errorDiv.textContent = 'JSON format error: ' + err.message;
        errorDiv.classList.add('show');
        document.getElementById('json-input').classList.add('error');
      }
    }

    function minifyJson() {
      const input = document.getElementById('json-input').value.trim();
      const output = document.getElementById('json-output');
      const errorDiv = document.getElementById('json-error');
      const successDiv = document.getElementById('json-success');

      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');

      if (!input) {
        errorDiv.textContent = 'Please enter JSON data';
        errorDiv.classList.add('show');
        return;
      }

      try {
        const parsed = JSON.parse(input);
        output.value = JSON.stringify(parsed);
        successDiv.classList.add('show');
        document.getElementById('json-input').classList.remove('error');
      } catch (err) {
        errorDiv.textContent = 'JSON format error: ' + err.message;
        errorDiv.classList.add('show');
        document.getElementById('json-input').classList.add('error');
      }
    }

    function clearAll() {
      document.getElementById('json-input').value = '';
      document.getElementById('json-output').value = '';
      document.getElementById('json-error').classList.remove('show');
      document.getElementById('json-success').classList.remove('show');
      document.getElementById('json-input').classList.remove('error');
    }

    function formatJsonOutput(text) {
      try {
        const parsed = JSON.parse(text);
        return JSON.stringify(parsed, null, 2);
      } catch (e) {
        return text;
      }
    }

    // Text Diff Functions
    function loadDiffFile(num) {
      const fileInput = document.getElementById('diff-file' + num);
      const fileNameSpan = document.getElementById('diff-file' + num + '-name');
      const textarea = document.getElementById('diff-text' + num);
      
      const file = fileInput.files[0];
      if (file) {
        fileNameSpan.textContent = file.name;
        
        const reader = new FileReader();
        reader.onload = function(e) {
          textarea.value = e.target.result;
        };
        reader.readAsText(file);
      }
    }

    function clearDiff() {
      document.getElementById('diff-text1').value = '';
      document.getElementById('diff-text2').value = '';
      document.getElementById('diff-file1').value = '';
      document.getElementById('diff-file2').value = '';
      document.getElementById('diff-file1-name').textContent = '';
      document.getElementById('diff-file2-name').textContent = '';
      document.getElementById('diff-result-card').style.display = 'none';
      document.getElementById('diff-output').innerHTML = '';
    }

    function performDiff() {
      const text1 = document.getElementById('diff-text1').value;
      const text2 = document.getElementById('diff-text2').value;
      const ignoreWhitespace = document.getElementById('ignoreWhitespace').checked;
      const ignoreCase = document.getElementById('ignoreCase').checked;
      
      let str1 = text1;
      let str2 = text2;
      
      if (ignoreCase) {
        str1 = str1.toLowerCase();
        str2 = str2.toLowerCase();
      }
      
      if (ignoreWhitespace) {
        str1 = str1.replace(/\s+/g, ' ').trim();
        str2 = str2.replace(/\s+/g, ' ').trim();
      }
      
      const lines1 = str1.split('\n');
      const lines2 = str2.split('\n');
      
      const diff = computeDiff(lines1, lines2);
      displayDiff(diff);
    }

    function computeDiff(lines1, lines2) {
      const m = lines1.length;
      const n = lines2.length;
      
      const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
      
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          if (lines1[i-1] === lines2[j-1]) {
            dp[i][j] = dp[i-1][j-1] + 1;
          } else {
            dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
          }
        }
      }
      
      const diff = [];
      let i = m, j = n;
      
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && lines1[i-1] === lines2[j-1]) {
          diff.unshift({ type: 'unchanged', line1: i, line2: j, content: lines1[i-1] });
          i--;
          j--;
        } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
          diff.unshift({ type: 'added', line2: j, content: lines2[j-1] });
          j--;
        } else {
          diff.unshift({ type: 'removed', line1: i, content: lines1[i-1] });
          i--;
        }
      }
      
      return diff;
    }

    function displayDiff(diff) {
      const output = document.getElementById('diff-output');
      const resultCard = document.getElementById('diff-result-card');
      
      let addedCount = 0;
      let removedCount = 0;
      
      let html = '';
      
      diff.forEach(item => {
        if (item.type === 'added') {
          addedCount++;
          html += '<div class="diff-added">+ ' + escapeHtml(item.content) + '</div>';
        } else if (item.type === 'removed') {
          removedCount++;
          html += '<div class="diff-removed">- ' + escapeHtml(item.content) + '</div>';
        } else {
          html += '<div class="diff-unchanged">  ' + escapeHtml(item.content) + '</div>';
        }
      });
      
      output.innerHTML = html;
      document.getElementById('diff-added-count').textContent = addedCount;
      document.getElementById('diff-removed-count').textContent = removedCount;
      document.getElementById('diff-total-changes').textContent = addedCount + removedCount;
      
      resultCard.style.display = 'block';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function copyDiffResult() {
      const diff = document.getElementById('diff-output').innerText;
      
      const textarea = document.createElement('textarea');
      textarea.value = diff;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      
      try {
        textarea.select();
        document.execCommand('copy');
        alert('Result copied to clipboard!');
      } catch (err) {
        alert('Failed to copy. Please select and copy manually.');
      } finally {
        document.body.removeChild(textarea);
      }
    }

    function downloadDiffResult() {
      const diff = document.getElementById('diff-output').innerText;
      const blob = new Blob([diff], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = 'diff_result_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function refreshTimestamp() {
      const now = Date.now();
      const date = new Date();
      
      document.getElementById('timestamp-ms').textContent = now.toString();
      document.getElementById('timestamp-s').textContent = Math.floor(now / 1000).toString();
      document.getElementById('current-date').textContent = formatDate(date);
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      const ms = String(date.getMilliseconds()).padStart(3, '0');
      
      return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}.${ms}`;
    }

    refreshTimestamp();
    setInterval(refreshTimestamp, 1000);

  </script>
</body>
</html>
