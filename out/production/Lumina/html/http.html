<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP Tools - Toolkit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      padding-top: 140px;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 15px;
      font-size: 1.8rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .nav-menu {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 12px 25px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      background: #667eea;
      color: white;
    }

    .nav-btn.active {
      background: #667eea;
      color: white;
    }

    .tool-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    .tool-card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.4rem;
      border-left: 4px solid #667eea;
      padding-left: 15px;
    }

    .timestamp-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .timestamp-box {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .timestamp-box label {
      display: block;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 15px;
      word-break: break-all;
    }

    .value.small {
      font-size: 1.2rem;
    }

    .http-config {
      margin-top: 20px;
    }

    .http-config label {
      display: block;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .http-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .http-row select,
    .http-row input {
      padding: 10px 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .http-row select:focus,
    .http-row input:focus {
      outline: none;
      border-color: #667eea;
    }

    .http-row select {
      min-width: 120px;
    }

    .http-row input {
      flex: 1;
    }

    .http-headers,
    .http-body {
      margin-bottom: 15px;
    }

    .http-headers textarea,
    .http-body textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      overflow: auto;
      transition: border-color 0.2s;
    }

    .http-headers textarea:focus,
    .http-body textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .http-body textarea {
      height: 200px;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-sm {
      padding: 6px 15px;
      font-size: 0.85rem;
    }

    .response-section {
      margin-top: 25px;
    }

    .response-section label {
      display: block;
      color: #666;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .response-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }

    .response-meta span {
      padding: 6px 12px;
      background: #f0f0f0;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .response-meta span.success {
      background: #d4edda;
      color: #155724;
    }

    .response-meta span.error {
      background: #f8d7da;
      color: #721c24;
    }

    .response-section textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      overflow: auto;
      background: #f8f9fa;
    }

    .convert-btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .save-hint {
      color: #28a745;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .save-info {
      font-size: 0.85rem;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <h1>HTTP Tools</h1>
      <div class="nav-menu">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="database.html" class="nav-btn">Database</a>
        <a href="http.html" class="nav-btn active">HTTP Tools</a>
        <a href="diff.html" class="nav-btn">Text Diff</a>
        <a href="crypto.html" class="nav-btn">Encryption</a>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="tool-card">
      <h2>Timestamp Tool</h2>
      <div class="timestamp-section">
        <div class="timestamp-box">
          <label>Current Time (ms)</label>
          <div class="value" id="timestamp-ms">--</div>
          <button class="btn btn-sm" onclick="copyToClipboard('timestamp-ms')">Copy</button>
        </div>
        <div class="timestamp-box">
          <label>Current Time (s)</label>
          <div class="value" id="timestamp-s">--</div>
          <button class="btn btn-sm" onclick="copyToClipboard('timestamp-s')">Copy</button>
        </div>
        <div class="timestamp-box">
          <label>Current DateTime</label>
          <div class="value small" id="current-date">--</div>
        </div>
      </div>
    </div>

    <div class="tool-card">
      <h2>HTTP Request Tool</h2>
      <div class="http-config">
        <div class="http-row">
          <select id="http-method">
            <option value="GET">GET</option>
            <option value="POST" selected>POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="PATCH">PATCH</option>
          </select>
          <div style="flex: 1; position: relative;">
            <input type="text" id="http-url" placeholder="https://api.example.com/endpoint" style="width: 100%;" />
            <select id="request-select" style="position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
              <option value="" selected>Select a saved request...</option>
            </select>
          </div>
        </div>
        <div class="http-headers">
          <label>Headers (JSON format)</label>
          <textarea id="http-headers" placeholder='{"Content-Type": "application/json", "Authorization": "Bearer token"}'></textarea>
        </div>
        <div class="http-body">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <label>Request Body (JSON format, for POST/PUT/PATCH)</label>
            <button class="btn btn-sm" onclick="formatHttpBody()" style="padding: 4px 12px; font-size: 0.8rem;">Format</button>
          </div>
          <textarea id="http-body" placeholder='{"key": "value"}' onblur="formatHttpBody()"></textarea>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <button class="btn" onclick="sendHttpRequest()">Send Request</button>
          <button class="btn btn-secondary" onclick="clearHttp()">Clear</button>
          <button class="btn" onclick="saveHttpRequest()">Save Request</button>
          <span id="save-hint" class="save-hint" style="display: none;">✓ Saved</span>
        </div>
        <div class="save-info">
          <span id="last-saved" style="display: none;">Last saved: <span id="last-saved-time"></span></span>
          <span id="no-saved" style="display: block;">No saved request yet</span>
        </div>
      </div>
      <div class="response-section">
        <label>Response</label>
        <div class="response-meta">
          <span id="http-status">Status: --</span>
          <span id="http-time">Time: -- ms</span>
        </div>
        <textarea id="http-response" placeholder="Response will appear here..." readonly style="height: 200px;"></textarea>
        <div class="convert-btn-group">
          <button class="btn btn-secondary" onclick="copyToClipboard('http-response')">Copy Response</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function copyToClipboard(elementId) {
      const element = document.getElementById(elementId);
      if (!element) return;

      let textToCopy;
      if (element.tagName === 'TEXTAREA' || element.tagName === 'INPUT') {
        textToCopy = element.value;
      } else {
        textToCopy = element.textContent;
      }

      if (!textToCopy || textToCopy === '--') {
        alert('No content to copy');
        return;
      }

      const textarea = document.createElement('textarea');
      textarea.value = textToCopy;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);

      try {
        textarea.select();
        document.execCommand('copy');
      } catch (err) {
        alert('Failed to copy. Please select manually.');
      } finally {
        document.body.removeChild(textarea);
      }
    }

    async function sendHttpRequest() {
      const method = document.getElementById('http-method').value;
      const url = document.getElementById('http-url').value.trim();
      const headersText = document.getElementById('http-headers').value.trim();
      const bodyText = document.getElementById('http-body').value.trim();
      
      const statusEl = document.getElementById('http-status');
      const timeEl = document.getElementById('http-time');
      const responseEl = document.getElementById('http-response');
      
      if (!url) {
        alert('Please enter URL');
        return;
      }
      
      statusEl.textContent = 'Status: Loading...';
      statusEl.className = '';
      timeEl.textContent = 'Time: -- ms';
      responseEl.value = '';
      
      const startTime = Date.now();
      
      try {
        let headers = {};
        if (headersText) {
          try {
            headers = JSON.parse(headersText);
          } catch (e) {
            alert('Invalid headers JSON format');
            statusEl.textContent = 'Status: Error';
            statusEl.className = '';
            return;
          }
        }
        
        const options = {
          method: method,
          headers: headers
        };
        
        if (['POST', 'PUT', 'PATCH'].includes(method) && bodyText) {
          try {
            JSON.parse(bodyText);
            options.body = bodyText;
          } catch (e) {
            alert('Invalid body JSON format');
            statusEl.textContent = 'Status: Error';
            statusEl.className = '';
            return;
          }
        }
        
        // 通过服务器代理发送请求，避免跨域问题
        const proxyResponse = await fetch('/api/http/proxy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            method: method,
            url: url,
            headers: JSON.stringify(headers),
            body: bodyText
          })
        });
        const proxyResult = await proxyResponse.json();
        
        if (!proxyResult.success) {
          throw new Error(proxyResult.message || 'Proxy request failed');
        }
        
        const response = {
          status: proxyResult.status,
          statusText: proxyResult.status >= 200 && proxyResult.status < 300 ? 'OK' : 'Error',
          ok: proxyResult.status >= 200 && proxyResult.status < 300,
          headers: {
            get: () => 'application/json'
          },
          text: async () => proxyResult.response
        };
        const elapsed = Date.now() - startTime;
        
        statusEl.textContent = `Status: ${response.status} ${response.statusText}`;
        statusEl.className = response.ok ? 'success' : 'error';
        timeEl.textContent = `Time: ${elapsed} ms`;
        
        const contentType = response.headers.get('content-type');
        let result;
        
        try {
          result = await response.text();
          if (contentType && contentType.includes('application/json')) {
            const formatted = JSON.stringify(JSON.parse(result), null, 2);
            responseEl.value = formatted;
          } else {
            responseEl.value = result;
          }
          autoSaveHttpFormData(); // Save response after setting
        } catch (e) {
          responseEl.value = result;
          autoSaveHttpFormData(); // Save response after setting
        }
        
      } catch (error) {
        const elapsed = Date.now() - startTime;
        statusEl.textContent = `Status: Error - ${error.message}`;
        statusEl.className = 'error';
        timeEl.textContent = `Time: ${elapsed} ms`;
        responseEl.value = `Error: ${error.message}\n\nPlease ensure the URL is correct and the server is accessible.`;
        autoSaveHttpFormData(); // Save error response
      }
    }

    function formatHttpBody() {
      const bodyText = document.getElementById('http-body').value.trim();
      if (!bodyText) return;
      
      try {
        const parsed = JSON.parse(bodyText);
        const formatted = JSON.stringify(parsed, null, 2);
        if (formatted !== bodyText) {
          document.getElementById('http-body').value = formatted;
        }
      } catch (e) {
        // Invalid JSON, don't format
      }
    }

    function clearHttp() {
      document.getElementById('http-url').value = '';
      document.getElementById('http-headers').value = '';
      document.getElementById('http-body').value = '';
      document.getElementById('http-status').textContent = 'Status: --';
      document.getElementById('http-status').className = '';
      document.getElementById('http-time').textContent = 'Time: -- ms';
      document.getElementById('http-response').value = '';
    }

    function saveHttpRequest() {
      const requestData = {
        method: document.getElementById('http-method').value,
        url: document.getElementById('http-url').value,
        headers: document.getElementById('http-headers').value,
        body: document.getElementById('http-body').value,
        savedAt: new Date().toISOString()
      };
      
      localStorage.setItem('savedHttpRequest', JSON.stringify(requestData));
      
      const hint = document.getElementById('save-hint');
      hint.style.display = 'inline';
      setTimeout(() => {
        hint.style.display = 'none';
      }, 2000);
      
      loadSavedHttpRequest();
    }

    // Auto-save form data
    function autoSaveHttpFormData() {
      const formData = {
        method: document.getElementById('http-method').value,
        url: document.getElementById('http-url').value,
        headers: document.getElementById('http-headers').value,
        body: document.getElementById('http-body').value,
        response: document.getElementById('http-response').value,
        status: document.getElementById('http-status').textContent,
        time: document.getElementById('http-time').textContent
      };
      localStorage.setItem('httpFormData', JSON.stringify(formData));
    }

    // Load auto-saved form data
    function loadHttpFormData() {
      const saved = localStorage.getItem('httpFormData');
      if (saved) {
        try {
          const formData = JSON.parse(saved);
          document.getElementById('http-method').value = formData.method || 'POST';
          document.getElementById('http-url').value = formData.url || '';
          document.getElementById('http-headers').value = formData.headers || '';
          document.getElementById('http-body').value = formData.body || '';
          document.getElementById('http-response').value = formData.response || '';
          document.getElementById('http-status').textContent = formData.status || 'Status: --';
          document.getElementById('http-time').textContent = formData.time || 'Time: -- ms';
        } catch (e) {
          console.error('Failed to load form data:', e);
        }
      }
    }

    function loadSavedHttpRequest() {
      const saved = localStorage.getItem('savedHttpRequest');
      
      if (saved) {
        try {
          const requestData = JSON.parse(saved);
          
          document.getElementById('http-method').value = requestData.method || 'GET';
          document.getElementById('http-url').value = requestData.url || '';
          document.getElementById('http-headers').value = requestData.headers || '';
          document.getElementById('http-body').value = requestData.body || '';
          
          document.getElementById('no-saved').style.display = 'none';
          document.getElementById('last-saved').style.display = 'inline';
          
          if (requestData.savedAt) {
            const savedDate = new Date(requestData.savedAt);
            document.getElementById('last-saved-time').textContent = formatDate(savedDate);
          }
        } catch (e) {
          console.error('Failed to load saved request:', e);
        }
      }
    }

    async function loadHttpConfig() {
      try {
        const response = await fetch('/api/config?' + Date.now());
        const config = await response.json();
        
        if (config.http && config.http.requests && Array.isArray(config.http.requests)) {
          const select = document.getElementById('request-select');
          // Clear existing options except the first one
          while (select.options.length > 1) {
            select.remove(1);
          }
          
          // Add saved requests to dropdown
          config.http.requests.forEach((req, index) => {
            const option = document.createElement('option');
            option.value = index.toString();
            const name = req.name || `Request ${index + 1}`;
            option.textContent = `${name}: ${req.url}`;
            select.appendChild(option);
          });
          
          // Load first request as default if no data entered yet
          if (config.http.requests.length > 0) {
            if (!document.getElementById('http-url').value && !document.getElementById('http-headers').value && !document.getElementById('http-body').value) {
              loadRequest(config.http.requests[0]);
            }
          }
        } else if (config.http) {
          // Legacy config format
          if (config.http.defaultUrl && !document.getElementById('http-url').value) {
            document.getElementById('http-url').value = config.http.defaultUrl;
          }
          if (config.http.defaultHeaders && !document.getElementById('http-headers').value) {
            document.getElementById('http-headers').value = config.http.defaultHeaders;
          }
          if (config.http.defaultBody && !document.getElementById('http-body').value) {
            let body = config.http.defaultBody;
            body = body.replace(/\{\{timestamp\}\}/g, Date.now().toString());
            document.getElementById('http-body').value = body;
          }
        }
      } catch (error) {
        console.log('Cannot load config file:', error);
      }
    }

    function loadRequest(request) {
      if (request.method) {
        document.getElementById('http-method').value = request.method;
      }
      if (request.url) {
        document.getElementById('http-url').value = request.url;
      }
      if (request.headers) {
        document.getElementById('http-headers').value = request.headers;
      }
      if (request.body) {
        let body = request.body;
        body = body.replace(/\{\{timestamp\}\}/g, Date.now().toString());
        document.getElementById('http-body').value = body;
      }
    }

    // Add event listeners to auto-save form data
    document.addEventListener('DOMContentLoaded', function() {
      const inputs = ['http-method', 'http-url', 'http-headers', 'http-body'];
      inputs.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', autoSaveHttpFormData);
          el.addEventListener('change', autoSaveHttpFormData);
        }
      });
      
      // Request select change handler
      const requestSelect = document.getElementById('request-select');
      if (requestSelect) {
        requestSelect.addEventListener('change', async function() {
          const index = parseInt(this.value);
          if (!isNaN(index)) {
            try {
              const response = await fetch('/api/config?' + Date.now());
              const config = await response.json();
              if (config.http && config.http.requests && config.http.requests[index]) {
                loadRequest(config.http.requests[index]);
              }
            } catch (error) {
              console.error('Failed to load request:', error);
            }
          }
        });
      }
      
      // Load saved form data first, then config, then saved request
      loadHttpFormData();
      loadHttpConfig();
      loadSavedHttpRequest();
      
      // Initialize timestamp
      refreshTimestamp();
      setInterval(refreshTimestamp, 1000);
    });
    
    function refreshTimestamp() {
      const now = Date.now();
      const date = new Date();
      
      const msEl = document.getElementById('timestamp-ms');
      const sEl = document.getElementById('timestamp-s');
      const dateEl = document.getElementById('current-date');
      
      if (msEl) msEl.textContent = now.toString();
      if (sEl) sEl.textContent = Math.floor(now / 1000).toString();
      if (dateEl) dateEl.textContent = formatDate(date);
    }
    
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      const ms = String(date.getMilliseconds()).padStart(3, '0');
      
      return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}.${ms}`;
    }
  </script>
</body>
</html>
