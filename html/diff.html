<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Diff - Toolkit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      padding-top: 140px;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 15px;
      font-size: 1.8rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .nav-menu {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 12px 25px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      background: #667eea;
      color: white;
    }

    .nav-btn.active {
      background: #667eea;
      color: white;
    }

    .tool-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    .tool-card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.4rem;
      border-left: 4px solid #667eea;
      padding-left: 15px;
    }

    .diff-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .text-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .text-panel label {
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .text-panel .text-input {
      width: 100%;
      height: 250px;
      max-height: 400px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
      overflow-x: auto;
      overflow-y: auto;
      transition: border-color 0.3s;
      background: white;
      white-space: pre-wrap;
      word-wrap: break-word;
      word-break: break-all;
      box-sizing: border-box;
      max-width: 100%;
    }

    .text-panel .text-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .text-panel .text-input:empty:before {
      content: attr(data-placeholder);
      color: #aaa;
    }

    .file-upload {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .file-upload input[type="file"] {
      display: none;
    }

    .file-upload label {
      display: inline-block;
      padding: 8px 16px;
      background: #f0f0f0;
      color: #666;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .file-upload label:hover {
      background: #e0e0e0;
    }

    .file-name {
      margin-left: 10px;
      color: #667eea;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .options {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .option-group label {
      cursor: pointer;
      color: #555;
      font-size: 0.95rem;
    }

    .diff-message {
      margin-top: 20px;
      padding: 15px 20px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
    }

    .diff-message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .diff-message.warning {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
    }

    .highlight-diff {
      background-color: #ffeaea;
      color: #dc3545;
      border-radius: 2px;
    }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .convert-btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: center;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 15px;
      background: #f8f9fa;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .stat-added {
      background: #d4edda;
      color: #155724;
    }

    .stat-removed {
      background: #f8d7da;
      color: #721c24;
    }

    .diff-output {
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 15px;
    }

    .diff-added {
      background: #d4edda;
      color: #155724;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .diff-removed {
      background: #f8d7da;
      color: #721c24;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .diff-unchanged {
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <h1>Text Diff Tool</h1>
      <div class="nav-menu">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="database.html" class="nav-btn">Database</a>
        <a href="http.html" class="nav-btn">HTTP Tools</a>
        <a href="diff.html" class="nav-btn active">Text Diff</a>
        <a href="crypto.html" class="nav-btn">Encryption</a>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="tool-card">
      <h2>Compare Two Texts</h2>
      
      <div class="diff-container">
        <div class="text-panel">
          <label>Left</label>
          <div class="file-upload" style="display: none;">
            <input type="file" id="diff-file1" accept=".txt,.java,.js,.html,.css,.json,.xml,.md,.sql" onchange="loadDiffFile(1)">
            <label for="diff-file1">📁 Load File</label>
            <span class="file-name" id="diff-file1-name"></span>
          </div>
          <div id="diff-text1" class="text-input" data-placeholder="Enter original text here..." contenteditable="true"></div>
        </div>
        
        <div class="text-panel">
          <label>Right</label>
          <div class="file-upload" style="display: none;">
            <input type="file" id="diff-file2" accept=".txt,.java,.js,.html,.css,.json,.xml,.md,.sql" onchange="loadDiffFile(2)">
            <label for="diff-file2">📁 Load File</label>
            <span class="file-name" id="diff-file2-name"></span>
          </div>
          <div id="diff-text2" class="text-input" data-placeholder="Enter modified text here..." contenteditable="true"></div>
        </div>
      </div>
      
      <div class="options">
        <div class="option-group">
          <input type="checkbox" id="ignoreCase" onchange="performDiff()">
          <label for="ignoreCase">Ignore Case</label>
        </div>
        <div class="option-group">
          <input type="checkbox" id="ignoreOrder" onchange="performDiff()">
          <label for="ignoreOrder">Ignore Order (JSON)</label>
        </div>
      </div>
      
      <div class="convert-btn-group">
        <button class="btn" onclick="performDiff()">Compare</button>
        <button class="btn btn-secondary" onclick="clearDiff()">Clear</button>
      </div>
      
      <div id="diff-message" class="diff-message" style="display: none;">
        <div id="diff-message-content"></div>
      </div>
    </div>
  </div>

  <script>
    function isJson(text) {
      try {
        JSON.parse(text);
        return true;
      } catch {
        return false;
      }
    }

    function formatJson(text) {
      try {
        const parsed = JSON.parse(text);
        return JSON.stringify(parsed, null, 2);
      } catch {
        return text;
      }
    }

    function loadDiffFile(num) {
      const fileInput = document.getElementById('diff-file' + num);
      const fileNameSpan = document.getElementById('diff-file' + num + '-name');
      const textDiv = document.getElementById('diff-text' + num);
      
      const file = fileInput.files[0];
      if (file) {
        fileNameSpan.textContent = file.name;
        
        const reader = new FileReader();
        reader.onload = function(e) {
          let content = e.target.result;
          if (isJson(content)) {
            content = formatJson(content);
          }
          textDiv.textContent = content;
        };
        reader.readAsText(file);
      }
    }

    function clearDiff() {
      document.getElementById('diff-text1').textContent = '';
      document.getElementById('diff-text2').textContent = '';
      document.getElementById('diff-file1').value = '';
      document.getElementById('diff-file2').value = '';
      document.getElementById('diff-file1-name').textContent = '';
      document.getElementById('diff-file2-name').textContent = '';
      document.getElementById('diff-message').style.display = 'none';
      
      const textDiv1 = document.getElementById('diff-text1');
      const textDiv2 = document.getElementById('diff-text2');
      textDiv1.style.backgroundColor = '';
      textDiv2.style.backgroundColor = '';
      textDiv1.classList.remove('diff-highlight');
      textDiv2.classList.remove('diff-highlight');
      
      // Clear localStorage
      localStorage.removeItem('diffFormData');
    }

    // Save form data to localStorage
    function saveDiffFormData() {
      const formData = {
        text1: document.getElementById('diff-text1').textContent,
        text2: document.getElementById('diff-text2').textContent,
        ignoreCase: document.getElementById('ignoreCase').checked,
        ignoreOrder: document.getElementById('ignoreOrder').checked
      };
      localStorage.setItem('diffFormData', JSON.stringify(formData));
    }

    // Load form data from localStorage
    function loadDiffFormData() {
      const saved = localStorage.getItem('diffFormData');
      if (saved) {
        try {
          const formData = JSON.parse(saved);
          document.getElementById('diff-text1').textContent = formData.text1 || '';
          document.getElementById('diff-text2').textContent = formData.text2 || '';
          document.getElementById('ignoreCase').checked = formData.ignoreCase || false;
          document.getElementById('ignoreOrder').checked = formData.ignoreOrder || false;
          
          // Re-run diff if there's saved content
          if (formData.text1 || formData.text2) {
            performDiff();
          }
        } catch (e) {
          console.error('Failed to load form data:', e);
        }
      }
    }

    // Add event listeners to auto-save form data
    document.addEventListener('DOMContentLoaded', function() {
      const textDivs = ['diff-text1', 'diff-text2'];
      textDivs.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', saveDiffFormData);
          el.addEventListener('blur', saveDiffFormData);
        }
      });
      
      const checkboxes = ['ignoreCase', 'ignoreOrder'];
      checkboxes.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('change', saveDiffFormData);
        }
      });
      
      // Load saved form data
      loadDiffFormData();
    });

    function findDifferences(text1, text2) {
      const diffs1 = [];
      const diffs2 = [];
      
      const len1 = text1.length;
      const len2 = text2.length;
      const maxLen = Math.max(len1, len2);
      
      for (let i = 0; i < maxLen; i++) {
        const char1 = i < len1 ? text1[i] : '';
        const char2 = i < len2 ? text2[i] : '';
        
        if (char1 !== char2) {
          diffs1.push(i);
          diffs2.push(i);
        }
      }
      
      return { diffs1, diffs2 };
    }

    function highlightDifferences(textarea, diffs) {
      const text = textarea.value;
      let highlighted = '';
      
      for (let i = 0; i < text.length; i++) {
        if (diffs.includes(i)) {
          highlighted += `<mark style="background-color: #ffeaea; color: #dc3545;">${escapeHtml(text[i])}</mark>`;
        } else {
          highlighted += escapeHtml(text[i]);
        }
      }
      
      return highlighted;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function highlightTextDifferences(text1, text2, ignoreCase) {
      // 标准化：去除所有空白字符
      const ignoreAllWhitespace = true;
      const normalize = (line) => {
        let l = line;
        if (ignoreCase) l = l.toLowerCase();
        if (ignoreAllWhitespace) l = l.replace(/\s+/g, '');
        return l;
      };
      
      const norm1 = normalize(text1);
      const norm2 = normalize(text2);
      
      // 如果标准化后完全相同，则没有差异
      if (norm1 === norm2) {
        return {
          highlighted1: escapeHtml(text1),
          highlighted2: escapeHtml(text2)
        };
      }
      
      // 基于 token 的比对：把字符串、数字、标识符、标点分别作为整体
      // 这样 `"longitude"` 永远作为一个完整单位，要么全匹配，要么全不匹配
      const tokenize = (s) => {
        const tokens = [];
        let i = 0;
        while (i < s.length) {
          const ch = s[i];
          if (ch === '"') {
            let j = i + 1;
            while (j < s.length && s[j] !== '"') {
              if (s[j] === '\\') j++;
              j++;
            }
            tokens.push(s.substring(i, j + 1));
            i = j + 1;
          } else if (/[0-9]/.test(ch) || (ch === '-' && /[0-9]/.test(s[i + 1] || ''))) {
            let j = i;
            if (s[j] === '-') j++;
            while (j < s.length && /[0-9.]/.test(s[j])) j++;
            tokens.push(s.substring(i, j));
            i = j;
          } else if (/[a-zA-Z_]/.test(ch)) {
            let j = i;
            while (j < s.length && /[a-zA-Z0-9_]/.test(s[j])) j++;
            tokens.push(s.substring(i, j));
            i = j;
          } else {
            tokens.push(ch);
            i++;
          }
        }
        return tokens;
      };
      
      const tokens1 = tokenize(norm1);
      const tokens2 = tokenize(norm2);
      
      // 使用简单直接的 LCS（O(n*m) 但对小到中等 JSON 足够快）
      // 关键修复：使用"先标记最长公共 token 段"的贪心策略，
      // 然后递归处理剩余的 diff 部分
      const matched1 = new Array(tokens1.length).fill(false);
      const matched2 = new Array(tokens2.length).fill(false);
      
      // 找到 tokens1 和 tokens2 的最长公共子序列（按 token）
      // 使用标准 LCS DP
      const n = tokens1.length;
      const m = tokens2.length;
      const dp = Array(n + 1).fill(null).map(() => Array(m + 1).fill(0));
      
      for (let i = 1; i <= n; i++) {
        for (let j = 1; j <= m; j++) {
          if (tokens1[i - 1] === tokens2[j - 1]) {
            dp[i][j] = dp[i - 1][j - 1] + 1;
          } else {
            dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
          }
        }
      }
      
      // 回溯：标记哪些 token 匹配
      let i = n, j = m;
      while (i > 0 && j > 0) {
        if (tokens1[i - 1] === tokens2[j - 1]) {
          matched1[i - 1] = true;
          matched2[j - 1] = true;
          i--;
          j--;
        } else if (dp[i - 1][j] >= dp[i][j - 1]) {
          i--;
        } else {
          j--;
        }
      }
      
      // 把 token 级别的 diff 映射到字符级别
      const charDiff1 = new Array(norm1.length).fill(false);
      const charDiff2 = new Array(norm2.length).fill(false);
      
      let pos1 = 0;
      for (let ti = 0; ti < n; ti++) {
        if (!matched1[ti]) {
          for (let c = 0; c < tokens1[ti].length; c++) {
            charDiff1[pos1 + c] = true;
          }
        }
        pos1 += tokens1[ti].length;
      }
      
      let pos2 = 0;
      for (let ti = 0; ti < m; ti++) {
        if (!matched2[ti]) {
          for (let c = 0; c < tokens2[ti].length; c++) {
            charDiff2[pos2 + c] = true;
          }
        }
        pos2 += tokens2[ti].length;
      }
      
      // 把字符级 diff 渲染回原始带格式的 text
      const buildHighlighted = (text, charDiff) => {
        let result = '';
        let ni = 0;  // 标准化字符串的字符索引
        for (let k = 0; k < text.length; k++) {
          const ch = text[k];
          if (ch.match(/\s/)) {
            // 空白字符永不标红
            result += escapeHtml(ch);
          } else {
            if (ni < charDiff.length && charDiff[ni]) {
              result += `<span style="background-color: #ffeaea; color: #dc3545; border-radius: 2px;">${escapeHtml(ch)}</span>`;
            } else {
              result += escapeHtml(ch);
            }
            ni++;
          }
        }
        return result;
      };
      
      return {
        highlighted1: buildHighlighted(text1, charDiff1),
        highlighted2: buildHighlighted(text2, charDiff2)
      };
    }

    function compareJsonObjects(obj1, obj2) {
      if (typeof obj1 !== typeof obj2) return false;
      
      if (Array.isArray(obj1) && Array.isArray(obj2)) {
        if (obj1.length !== obj2.length) return false;
        const sorted1 = [...obj1].sort((a, b) => JSON.stringify(a).localeCompare(JSON.stringify(b)));
        const sorted2 = [...obj2].sort((a, b) => JSON.stringify(a).localeCompare(JSON.stringify(b)));
        return JSON.stringify(sorted1) === JSON.stringify(sorted2);
      }
      
      if (typeof obj1 === 'object' && obj1 !== null && obj2 !== null) {
        const keys1 = Object.keys(obj1).sort();
        const keys2 = Object.keys(obj2).sort();
        
        if (JSON.stringify(keys1) !== JSON.stringify(keys2)) return false;
        
        for (const key of keys1) {
          if (!compareJsonObjects(obj1[key], obj2[key])) return false;
        }
        return true;
      }
      
      return obj1 === obj2;
    }

    function sortJson(obj, ignoreCase = false) {
      if (Array.isArray(obj)) {
        return obj.map(item => sortJson(item, ignoreCase)).sort((a, b) => JSON.stringify(a).localeCompare(JSON.stringify(b)));
      }
      if (typeof obj === 'object' && obj !== null) {
        const sorted = {};
        const keys = Object.keys(obj);
        keys.sort((a, b) => {
          if (ignoreCase) {
            return a.toLowerCase().localeCompare(b.toLowerCase());
          }
          return a.localeCompare(b);
        }).forEach(key => {
          sorted[key] = sortJson(obj[key], ignoreCase);
        });
        return sorted;
      }
      return obj;
    }

    function performDiff() {
      let text1 = document.getElementById('diff-text1').textContent;
      let text2 = document.getElementById('diff-text2').textContent;
      const ignoreCase = document.getElementById('ignoreCase').checked;
      const ignoreOrder = document.getElementById('ignoreOrder').checked;
      
      const isJson1 = isJson(text1);
      const isJson2 = isJson(text2);
      
      // 格式化JSON以便更好地显示，但保持原始顺序
      let displayText1 = isJson1 ? formatJson(text1) : text1;
      let displayText2 = isJson2 ? formatJson(text2) : text2;
      
      // 用于比较的文本（去除所有空白）
      const compare1 = displayText1.replace(/\s+/g, '');
      const compare2 = displayText2.replace(/\s+/g, '');
      
      // 如果忽略顺序，先检查JSON内容是否相同（排序后）
      let areIdenticalWhenIgnoringOrder = false;
      if (ignoreOrder && isJson1 && isJson2) {
        try {
          const obj1 = JSON.parse(text1);
          const obj2 = JSON.parse(text2);
          const sortedObj1 = sortJson(obj1, ignoreCase);
          const sortedObj2 = sortJson(obj2, ignoreCase);
          const sortedText1 = JSON.stringify(sortedObj1).replace(/\s+/g, '');
          const sortedText2 = JSON.stringify(sortedObj2).replace(/\s+/g, '');
          
          let compareSorted1 = sortedText1;
          let compareSorted2 = sortedText2;
          
          if (ignoreCase) {
            compareSorted1 = compareSorted1.toLowerCase();
            compareSorted2 = compareSorted2.toLowerCase();
          }
          
          areIdenticalWhenIgnoringOrder = compareSorted1 === compareSorted2;
        } catch (e) {
          console.log('JSON parse error:', e);
        }
      }
      
      const finalCompare1 = ignoreCase ? compare1.toLowerCase() : compare1;
      const finalCompare2 = ignoreCase ? compare2.toLowerCase() : compare2;
      
      const messageDiv = document.getElementById('diff-message');
      const messageContent = document.getElementById('diff-message-content');
      
      // 如果忽略顺序且排序后内容相同，则认为相同
      if (areIdenticalWhenIgnoringOrder || finalCompare1 === finalCompare2) {
        messageDiv.className = 'diff-message success';
        messageContent.textContent = areIdenticalWhenIgnoringOrder ? '✅ Texts are identical (ignoring order)' : '✅ Texts are identical';
        messageDiv.style.display = 'block';
        
        document.getElementById('diff-text1').innerHTML = escapeHtml(displayText1);
        document.getElementById('diff-text2').innerHTML = escapeHtml(displayText2);
        document.getElementById('diff-text1').style.backgroundColor = '#d4edda';
        document.getElementById('diff-text2').style.backgroundColor = '#d4edda';
      } else {
        messageDiv.className = 'diff-message warning';
        messageContent.textContent = '⚠️ Differences found, highlighted in red';
        messageDiv.style.display = 'block';
        
        const { highlighted1, highlighted2 } = highlightTextDifferences(displayText1, displayText2, ignoreCase);
        document.getElementById('diff-text1').innerHTML = highlighted1;
        document.getElementById('diff-text2').innerHTML = highlighted2;
        document.getElementById('diff-text1').style.backgroundColor = '';
        document.getElementById('diff-text2').style.backgroundColor = '';
      }
    }
  </script>
